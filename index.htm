<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Matrimonial Biodata</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
    min-height: 100vh;
    padding: 40px 20px;
    position: relative;
}

/* Animated background circles */
body::before,
body::after {
    content: '';
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.3;
    animation: float 10s ease-in-out infinite;
    pointer-events: none;
}

body::before {
    width: 400px;
    height: 400px;
    background: #ff6b9d;
    top: -150px;
    left: -150px;
}

body::after {
    width: 500px;
    height: 500px;
    background: #4ecdc4;
    bottom: -200px;
    right: -200px;
    animation-delay: -5s;
}

@keyframes float {
    0%, 100% { transform: translate(0, 0) rotate(0deg); }
    33% { transform: translate(50px, -50px) rotate(120deg); }
    66% { transform: translate(-50px, 50px) rotate(240deg); }
}

/* Container */
.container {
    max-width: 900px;
    margin: 0 auto;
    background: rgba(255, 255, 255, 0.98);
    backdrop-filter: blur(20px);
    padding: 45px;
    border-radius: 25px;
    box-shadow: 0 25px 60px rgba(0, 0, 0, 0.25),
                0 0 0 1px rgba(255, 255, 255, 0.5) inset;
    position: relative;
    z-index: 1;
    animation: slideUp 0.6s ease-out;
}

@keyframes slideUp {
    from {
        opacity: 0;
        transform: translateY(30px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* Header */
.header {
    text-align: center;
    margin-bottom: 40px;
    position: relative;
}

.header-icon {
    width: 70px;
    height: 70px;
    margin: 0 auto 15px;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    border-radius: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 35px;
    box-shadow: 0 10px 25px rgba(102, 126, 234, 0.3);
}

h2 {
    font-size: 32px;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 8px;
    font-weight: 700;
}

.subtitle {
    color: #6b7280;
    font-size: 15px;
    font-weight: 500;
}

/* Section Title */
.section-title {
    margin-top: 35px;
    margin-bottom: 25px;
    font-size: 20px;
    font-weight: 700;
    color: #1f2937;
    display: flex;
    align-items: center;
    gap: 12px;
}

.section-title::before {
    content: '';
    width: 5px;
    height: 28px;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    border-radius: 3px;
}

.section-title .icon {
    font-size: 24px;
}

/* Grid */
.grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 20px;
}

/* Form Fields */
.field {
    display: flex;
    flex-direction: column;
}

label {
    font-size: 14px;
    font-weight: 600;
    color: #374151;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 6px;
}

label .required {
    color: #ef4444;
    font-size: 16px;
}

input, select {
    width: 100%;
    padding: 12px 16px;
    border-radius: 12px;
    border: 2px solid #e5e7eb;
    font-size: 14px;
    font-family: inherit;
    transition: all 0.3s ease;
    background: #fff;
}

input:focus, select:focus {
    border-color: #667eea;
    box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
    outline: none;
}

input::placeholder {
    color: #9ca3af;
}

/* Error Messages */
.error {
    color: #ef4444;
    font-size: 12px;
    margin-top: 5px;
    font-weight: 500;
}

/* Photo Upload */
.photo-upload {
    grid-column: span 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 30px;
    border: 2px dashed #d1d5db;
    border-radius: 16px;
    background: #f9fafb;
    transition: all 0.3s ease;
    cursor: pointer;
    position: relative;
}

.photo-upload:hover {
    border-color: #667eea;
    background: #f3f4f6;
}

.photo-upload.has-image {
    border-style: solid;
    border-color: #667eea;
    background: linear-gradient(135deg, rgba(102, 126, 234, 0.05) 0%, rgba(118, 75, 162, 0.05) 100%);
}

.upload-icon {
    width: 60px;
    height: 60px;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    margin-bottom: 12px;
    transition: transform 0.3s ease;
}

.photo-upload:hover .upload-icon {
    transform: scale(1.1);
}

.upload-text {
    font-size: 15px;
    font-weight: 600;
    color: #374151;
    margin-bottom: 4px;
}

.upload-subtext {
    font-size: 13px;
    color: #6b7280;
}

#photo {
    display: none;
}

.preview-container {
    margin-top: 15px;
    display: none;
}

.preview-container.show {
    display: block;
}

#preview {
    width: 150px;
    height: 150px;
    border-radius: 16px;
    object-fit: cover;
    border: 3px solid #667eea;
    box-shadow: 0 8px 20px rgba(102, 126, 234, 0.3);
}

/* Buttons */
.btn-group {
    display: flex;
    gap: 15px;
    justify-content: center;
    margin-top: 40px;
}

button {
    border: none;
    padding: 14px 35px;
    border-radius: 12px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s ease;
    display: flex;
    align-items: center;
    gap: 8px;
}

.submit {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
}

.submit:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 25px rgba(102, 126, 234, 0.5);
}

.submit:active {
    transform: translateY(0);
}

.clear {
    background: #f3f4f6;
    color: #374151;
    border: 2px solid #e5e7eb;
}

.clear:hover {
    background: #e5e7eb;
    border-color: #d1d5db;
}

/* Success Message */
.success-message {
    display: none;
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: white;
    padding: 40px;
    border-radius: 20px;
    box-shadow: 0 25px 60px rgba(0, 0, 0, 0.3);
    text-align: center;
    z-index: 1000;
    animation: popIn 0.4s ease-out;
}

@keyframes popIn {
    from {
        opacity: 0;
        transform: translate(-50%, -50%) scale(0.8);
    }
    to {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1);
    }
}

.success-icon {
    width: 80px;
    height: 80px;
    margin: 0 auto 20px;
    background: linear-gradient(135deg, #10b981 0%, #059669 100%);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 40px;
}

/* Responsive */
@media (max-width: 768px) {
    .container {
        padding: 30px 20px;
    }
    
    .grid {
        grid-template-columns: 1fr;
    }
    
    h2 {
        font-size: 26px;
    }
    
    .btn-group {
        flex-direction: column;
    }
    
    button {
        width: 100%;
        justify-content: center;
    }
    
    .photo-upload {
        grid-column: span 1;
    }
}
</style>
</head>

<body>

<div class="container">

<div class="header">
    <div class="header-icon">💍</div>
    <h2>Matrimonial Biodata</h2>
    <p class="subtitle">Create your profile for marriage proposal</p>
</div>

<form onsubmit="return validateForm()">

<div class="section-title">
    <span class="icon"></span>
    Personal Information
</div>

<div class="grid">

<div class="field">
    <label>Full Name <span class="required">*</span></label>
    <input type="text" id="name" placeholder="Enter your full name">
    <span class="error" id="nameError"></span>
</div>

<div class="field">
    <label>Gender <span class="required">*</span></label>
    <select id="gender">
        <option value="">Select Gender</option>
        <option>Male</option>
        <option>Female</option>
        <option>Other</option>
    </select>
    <span class="error" id="genderError"></span>
</div>

<div class="field">
    <label>Birth Date <span class="required">*</span></label>
    <input type="date" id="dob">
    <span class="error" id="dobError"></span>
</div>

<div class="field">
    <label>Birth Place <span class="required">*</span></label>
    <input type="text" id="birthPlace" placeholder="City, Country">
    <span class="error" id="birthPlaceError"></span>
</div>

<div class="field">
    <label>Religion <span class="required">*</span></label>
    <select id="religion">
        <option value="">Select Religion</option>
        <option>Islam</option>
        <option>Hindu</option>
        <option>Christian</option>
        <option>Buddhist</option>
    </select>
    <span class="error" id="religionError"></span>
</div>

<div class="field">
    <label>Height <span class="required">*</span></label>
    <input type="text" id="height" placeholder="5 ft 6 in">
    <span class="error" id="heightError"></span>
</div>

<div class="field">
    <label>Blood Group <span class="required">*</span></label>
    <select id="blood">
        <option value="">Select Blood Group</option>
        <option>A+</option><option>A-</option>
        <option>B+</option><option>B-</option>
        <option>AB+</option><option>AB-</option>
        <option>O+</option><option>O-</option>
    </select>
    <span class="error" id="bloodError"></span>
</div>

<div class="field">
    <label>Education <span class="required">*</span></label>
    <select id="education">
        <option value="">Select Education Level</option>
        <option>SSC</option>
        <option>HSC</option>
        <option>Bachelor</option>
        <option>Masters</option>
        <option>PhD</option>
    </select>
    <span class="error" id="educationError"></span>
</div>

<div class="field">
    <label>Occupation <span class="required">*</span></label>
    <input type="text" id="occupation" placeholder="Your profession">
    <span class="error" id="occupationError"></span>
</div>

<div class="field">
    <label>Monthly Income</label>
    <input type="text" id="income" placeholder="৳ 50,000">
</div>

<label for="photo" class="photo-upload" id="photoUploadBox">
    <div class="upload-icon">📸</div>
    <div class="upload-text">Upload Profile Photo</div>
    <div class="upload-subtext">Click to select image (JPG, PNG)</div>
    <input type="file" id="photo" accept="image/*" onchange="previewImage()">
    <span class="error" id="photoError"></span>
    <div class="preview-container" id="previewContainer">
        <img id="preview" alt="Preview">
    </div>
</label>

</div>

<div class="section-title">
    <span class="icon"></span>
    Family Information
</div>

<div class="grid">

<div class="field">
    <label>Father's Name <span class="required">*</span></label>
    <input type="text" id="father" placeholder="Father's full name">
    <span class="error" id="fatherError"></span>
</div>

<div class="field">
    <label>Father's Occupation <span class="required">*</span></label>
    <input type="text" id="fatherOcc" placeholder="Father's profession">
    <span class="error" id="fatherOccError"></span>
</div>

<div class="field">
    <label>Mother's Name <span class="required">*</span></label>
    <input type="text" id="mother" placeholder="Mother's full name">
    <span class="error" id="motherError"></span>
</div>

<div class="field">
    <label>Mother's Occupation</label>
    <input type="text" id="motherOcc" placeholder="Mother's profession">
</div>

<div class="field">
    <label>Number of Siblings</label>
    <input type="number" id="siblings" placeholder="0" min="0">
</div>

<div class="field">
    <label>Contact Number <span class="required">*</span></label>
    <input type="text" id="phone" placeholder="01712345678">
    <span class="error" id="phoneError"></span>
</div>

<div class="field" style="grid-column: span 2;">
    <label>Permanent Address <span class="required">*</span></label>
    <input type="text" id="address" placeholder="House, Road, Area, City">
    <span class="error" id="addressError"></span>
</div>

</div>

<div class="btn-group">
    <button type="submit" class="submit">
        <span>✓</span>
        Submit Biodata
    </button>
    <button type="reset" class="clear" onclick="resetForm()">
        <span>↻</span>
        Clear Form
    </button>
</div>

</form>

</div>

<script>
// Image preview
function previewImage() {
    let file = photo.files[0];
    if (file) {
        let reader = new FileReader();
        reader.onload = e => {
            preview.src = e.target.result;
            previewContainer.classList.add('show');
            photoUploadBox.classList.add('has-image');
        }
        reader.readAsDataURL(file);
    }
}

// Reset form
function resetForm() {
    previewContainer.classList.remove('show');
    photoUploadBox.classList.remove('has-image');
    document.querySelectorAll(".error").forEach(e => e.innerText = "");
}

// Validation
function validateForm() {
    let valid = true;
    document.querySelectorAll(".error").forEach(e => e.innerText = "");

    function err(id, msg) {
        document.getElementById(id).innerText = msg;
        valid = false;
    }

    if (name.value.trim() == "") err("nameError", "Name is required");
    if (gender.value == "") err("genderError", "Please select gender");
    if (dob.value == "") err("dobError", "Date of birth is required");
    if (birthPlace.value.trim() == "") err("birthPlaceError", "Birth place is required");
    if (religion.value == "") err("religionError", "Please select religion");
    if (!/^[0-9]+ ?ft ?[0-9]+ ?in$/i.test(height.value.trim()))
        err("heightError", "Format: 5 ft 6 in");
    if (blood.value == "") err("bloodError", "Please select blood group");
    if (education.value == "") err("educationError", "Please select education");
    if (occupation.value.trim() == "") err("occupationError", "Occupation is required");

    if (father.value.trim() == "") err("fatherError", "Father's name is required");
    if (fatherOcc.value.trim() == "") err("fatherOccError", "Father's occupation is required");
    if (mother.value.trim() == "") err("motherError", "Mother's name is required");

    if (!/^01[3-9][0-9]{8}$/.test(phone.value.trim()))
        err("phoneError", "Invalid Bangladesh number");

    if (address.value.trim() == "") err("addressError", "Address is required");

    let file = photo.files[0];
    if (!file) err("photoError", "Please upload a photo");

    if (valid) {
        alert("✓ Biodata submitted successfully!");
    }

    return false; // Prevent actual form submission for demo
}
</script>

</body>
</html>
